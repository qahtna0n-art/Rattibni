<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رتّبني — لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a14;--surface:#0c1322;--card:#111827;--border:rgba(255,255,255,0.08);--gold:#d4af37;--gold3:rgba(212,175,55,0.08);--text:#f0ead8;--muted:#6b7a8f;--success:#10b981;--danger:#ef4444;--warn:#f59e0b}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-card{background:var(–card);border:1px solid var(–border);border-radius:20px;padding:2.5rem;max-width:380px;width:100%;text-align:center}
.login-logo{font-size:1.6rem;font-weight:900;color:var(–gold);margin-bottom:.3rem}
.login-sub{font-size:.78rem;color:var(–muted);margin-bottom:1.8rem}
.login-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(–border);border-radius:10px;padding:.8rem 1rem;color:var(–text);font-size:1rem;text-align:center;font-family:‘IBM Plex Mono’,monospace;margin-bottom:.8rem}
.login-input:focus{outline:none;border-color:var(–gold)}
.login-btn{width:100%;padding:.85rem;background:var(–gold);color:#060a14;border:none;border-radius:10px;font-size:1rem;font-weight:900;cursor:pointer;font-family:Tajawal}
.login-err{font-size:.74rem;color:var(–danger);margin-top:.4rem}

/* ADMIN */
.admin-wrap{display:none}
.admin-header{background:rgba(6,10,20,0.96);border-bottom:1px solid var(–border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
.admin-logo{font-size:1.1rem;font-weight:900;color:var(–gold)}
.admin-badge{background:var(–gold3);border:1px solid rgba(212,175,55,0.2);color:var(–gold);font-size:.68rem;font-weight:700;padding:.2rem .55rem;border-radius:100px}
.logout-btn{font-size:.72rem;color:var(–muted);background:none;border:1px solid var(–border);padding:.25rem .65rem;border-radius:6px;cursor:pointer;font-family:Tajawal;transition:all .2s}
.logout-btn:hover{color:var(–danger);border-color:var(–danger)}

.admin-body{max-width:1100px;margin:0 auto;padding:24px 20px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(–card);border:1px solid var(–border);border-radius:12px;padding:1.1rem;text-align:center}
.stat-num{font-size:1.8rem;font-weight:900;font-family:‘IBM Plex Mono’,monospace;color:var(–gold)}
.stat-label{font-size:.68rem;color:var(–muted);margin-top:.2rem}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* PANEL */
.panel{background:var(–card);border:1px solid var(–border);border-radius:16px;padding:1.3rem;margin-bottom:16px}
.panel-title{font-size:.86rem;font-weight:700;color:var(–gold);margin-bottom:1rem;display:flex;align-items:center;gap:.4rem;padding-bottom:.7rem;border-bottom:1px solid var(–border)}

/* FORM */
.form-group{margin-bottom:.75rem}
.form-label{font-size:.7rem;color:var(–muted);margin-bottom:.22rem;display:block;font-weight:600}
.form-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(–border);border-radius:8px;padding:.55rem .9rem;color:var(–text);font-size:.84rem;font-family:‘IBM Plex Mono’,monospace;direction:ltr;text-align:right}
.form-input:focus{outline:none;border-color:var(–gold);background:var(–gold3)}
.form-input-ar{font-family:Tajawal;direction:rtl;text-align:right}
.btn-gold{width:100%;padding:.72rem;background:var(–gold);color:#060a14;border:none;border-radius:8px;font-size:.88rem;font-weight:900;cursor:pointer;font-family:Tajawal;transition:all .2s;margin-top:.4rem}
.btn-gold:hover{background:#f0d060}
.btn-outline{width:100%;padding:.65rem;background:transparent;color:var(–text);border:1px solid var(–border);border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:Tajawal;transition:all .2s;margin-top:.4rem}
.btn-outline:hover{border-color:var(–gold);color:var(–gold)}

/* CODE DISPLAY */
.code-display{background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.25);border-radius:10px;padding:1rem;text-align:center;margin:.8rem 0}
.code-val{font-family:‘IBM Plex Mono’,monospace;font-size:1.4rem;font-weight:700;color:var(–gold);letter-spacing:2px}
.code-copy{margin-top:.4rem}

/* CLIENT LIST */
.client-item{background:rgba(255,255,255,0.02);border:1px solid var(–border);border-radius:10px;padding:.85rem;margin-bottom:.6rem}
.client-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.client-name{font-size:.86rem;font-weight:700}
.client-badge{font-size:.62rem;padding:.15rem .45rem;border-radius:4px;font-weight:700}
.badge-active{background:rgba(16,185,129,0.15);color:var(–success)}
.badge-pending{background:rgba(245,158,11,0.15);color:var(–warn)}
.badge-expired{background:rgba(239,68,68,0.15);color:var(–danger)}
.client-info{font-size:.72rem;color:var(–muted);line-height:1.5}
.client-actions{display:flex;gap:.4rem;margin-top:.6rem;flex-wrap:wrap}
.action-btn{padding:.28rem .65rem;border-radius:6px;font-size:.68rem;font-weight:700;cursor:pointer;border:none;font-family:Tajawal;transition:all .2s}
.btn-wa{background:#25d366;color:#fff}
.btn-wa:hover{background:#20bd5a}
.btn-ai{background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.2)}
.btn-ai:hover{background:rgba(59,130,246,0.25)}
.btn-del{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2)}
.btn-del:hover{background:rgba(239,68,68,0.2)}
.btn-approve{background:rgba(16,185,129,0.15);color:var(–success);border:1px solid rgba(16,185,129,0.2)}
.btn-approve:hover{background:rgba(16,185,129,0.25)}

/* AI MSG */
.ai-msg-box{background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.15);border-radius:10px;padding:1rem;margin-top:.7rem;font-size:.78rem;line-height:1.7;color:var(–text);white-space:pre-wrap;direction:rtl}
.ai-loading{text-align:center;padding:1rem;color:var(–muted);font-size:.8rem}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.82rem;font-weight:700;font-family:Tajawal;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
.toast.err{background:#ef4444}

/* SCROLL */
.clients-scroll{max-height:500px;overflow-y:auto;padding-right:4px}
.clients-scroll::-webkit-scrollbar{width:4px}
.clients-scroll::-webkit-scrollbar-track{background:transparent}
.clients-scroll::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px}

@media(max-width:660px){.stats-grid{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}
</style>

</head>

<script>
// ===== AUTH =====
const ADMIN_PW = 'rattibni@admin2026';
const API_KEY = 'pk_live_yhyfSD33cQnHyvNNjFHN5Cy6kRXYa3TPdy4mT78U';

function login(){
  const pw = document.getElementById('pw-input').value;
  if(pw === ADMIN_PW){
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-wrap').style.display = 'block';
    loadClients();
    renderClients();
  } else {
    document.getElementById('login-err').textContent = '❌ كلمة المرور غلط';
  }
}

function logout(){
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('admin-wrap').style.display = 'none';
  document.getElementById('pw-input').value = '';
}

// ===== STORAGE =====
let clients = [];
let currentFilter = 'all';

function saveClients(){ localStorage.setItem('rattibni_admin_clients', JSON.stringify(clients)); }
function loadClients(){ try{ clients = JSON.parse(localStorage.getItem('rattibni_admin_clients') || '[]'); }catch(e){ clients = []; } }

// ===== CODE GENERATION =====
function generateCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = 'RTB-';
  for(let i=0;i<4;i++) code += chars[Math.floor(Math.random()*chars.length)];
  code += '-';
  for(let i=0;i<4;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

// ===== ADD CLIENT =====
function addClient(){
  const name = document.getElementById('c-name').value.trim();
  const phone = document.getElementById('c-phone').value.trim();
  const salary = document.getElementById('c-salary').value || '0';
  const notes = document.getElementById('c-notes').value.trim();

  if(!name || !phone){ showToast('أدخل الاسم ورقم الواتساب', true); return; }

  const code = generateCode();
  const client = {
    id: Date.now(),
    name, phone, salary: parseInt(salary), notes,
    code,
    status: 'pending',
    joinDate: new Date().toLocaleDateString('ar-SA'),
    renewDate: '',
    messages: []
  };

  clients.unshift(client);
  saveClients();
  saveValidCode(code, client.name);
  renderClients();
  updateSelects();
  updateStats();

  // Clear form
  ['c-name','c-phone','c-salary','c-notes'].forEach(id => document.getElementById(id).value = '');

  showToast('✅ تم إضافة العميل وتوليد الكود');
}

// ===== APPROVE CLIENT =====
function approveClient(id){
  const c = clients.find(x=>x.id===id);
  if(!c) return;
  c.status = 'active';
  c.renewDate = new Date(Date.now() + 30*24*60*60*1000).toLocaleDateString('ar-SA');
  saveClients();
  saveValidCode(c.code, c.name);
  renderClients();
  updateStats();

  // Open WhatsApp with code
  const msg = encodeURIComponent(`السلام عليكم ${c.name} 👋\n\nتم تفعيل اشتراكك في رتّبني ✅\n\n🔑 كود الدخول: *${c.code}*\n\nادخل الموقع وأدخل الكود:\nhttps://rattibni.vercel.app\n\nمرحباً بك في عائلة رتّبني 🎉`);
  window.open(`https://wa.me/966${c.phone.replace(/^0/,'')}?text=${msg}`, '_blank');
  showToast('✅ تم القبول وفتح واتساب');
}

// ===== GEN CODE FOR CLIENT =====
function genCodeForClient(){
  const sel = document.getElementById('code-client-sel');
  const id = parseInt(sel.value);
  if(!id){ showToast('اختر عميلاً', true); return; }
  const c = clients.find(x=>x.id===id);
  if(!c) return;

  c.code = generateCode();
  saveClients();
  saveValidCode(c.code, c.name);

  document.getElementById('code-result').style.display = 'block';
  document.getElementById('code-val').textContent = c.code;

  const msg = encodeURIComponent(`مرحباً ${c.name} 👋\n\nكودك الجديد لرتّبني:\n🔑 *${c.code}*\n\nhttps://rattibni.vercel.app`);
  document.getElementById('wa-code-link').href = `https://wa.me/966${c.phone.replace(/^0/,'')}?text=${msg}`;
  showToast('✅ تم توليد الكود');
}

function copyCode(){
  const code = document.getElementById('code-val').textContent;
  navigator.clipboard.writeText(code);
  showToast('✅ تم نسخ الكود');
}

// ===== AI MESSAGE =====
async function genAIMsg(){
  const sel = document.getElementById('ai-client-sel');
  const id = parseInt(sel.value);
  const type = document.getElementById('ai-msg-type').value;
  if(!id){ showToast('اختر عميلاً', true); return; }

  const c = clients.find(x=>x.id===id);
  if(!c) return;

  const resultEl = document.getElementById('ai-result');
  resultEl.innerHTML = '<div class="ai-loading">⏳ جارٍ توليد الرسالة بالذكاء الاصطناعي...</div>';

  const typeLabels = {
    weekly: 'أسبوعية تحفيزية',
    monthly: 'شهرية تحليلية',
    welcome: 'ترحيب بالمشترك الجديد',
    reminder: 'تذكير بالادخار',
    warning: 'تحذير من إنفاق زائد'
  };

  const prompt = `أنت مستشار مالي سعودي محترف في تطبيق "رتّبني". اكتب رسالة واتساب ${typeLabels[type]} للعميل التالي:

الاسم: ${c.name}
الراتب الشهري: ${c.salary ? c.salary + ' ريال' : 'غير محدد'}
ملاحظات: ${c.notes || 'لا يوجد'}
تاريخ الانضمام: ${c.joinDate}

متطلبات الرسالة:
- باللغة العربية الفصيحة مع لمسة محلية سعودية
- لا تتجاوز 150 كلمة
- تبدأ بالسلام وتنتهي بتشجيع
- تتضمن رقماً أو نصيحة مالية عملية مخصصة لراتبه
- استخدم الإيموجي باعتدال
- النبرة: دافئة، مشجعة، احترافية

اكتب الرسالة فقط بدون أي مقدمة أو شرح.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    const msg = data.content?.[0]?.text || 'حدث خطأ في توليد الرسالة';

    // Save to client history
    c.messages.unshift({ type: typeLabels[type], text: msg, date: new Date().toLocaleDateString('ar-SA') });
    if(c.messages.length > 10) c.messages = c.messages.slice(0,10);
    saveClients();

    const encoded = encodeURIComponent(msg);
    const waLink = `https://wa.me/966${c.phone.replace(/^0/,'')}?text=${encoded}`;

    resultEl.innerHTML = `
      <div class="ai-msg-box">${msg}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.5rem">
        <button class="btn-outline" onclick="navigator.clipboard.writeText(\`${msg.replace(/`/g,"'")}\`);showToast('✅ تم نسخ الرسالة')">نسخ الرسالة</button>
        <a href="${waLink}" target="_blank" class="action-btn btn-wa" style="display:flex;align-items:center;justify-content:center;text-decoration:none;border-radius:8px;padding:.55rem;font-size:.82rem">إرسال واتساب 💬</a>
      </div>`;
    showToast('✅ تم توليد الرسالة');
  } catch(e) {
    resultEl.innerHTML = `<div class="ai-msg-box" style="color:var(--danger)">❌ خطأ: ${e.message}</div>`;
    showToast('❌ فشل توليد الرسالة', true);
  }
}

// ===== DELETE CLIENT =====
function deleteClient(id){
  if(!confirm('هل تريد حذف هذا العميل؟')) return;
  const deletedClient = clients.find(x=>x.id===id);
  if(deletedClient) deactivateCode(deletedClient.code);
  clients = clients.filter(x=>x.id!==id);
  saveClients();
  renderClients();
  updateSelects();
  updateStats();
  showToast('تم الحذف');
}

// ===== FILTER =====
function filterClients(filter){
  currentFilter = filter;
  renderClients();
}

// ===== RENDER =====
function renderClients(){
  const list = document.getElementById('clients-list');
  const filtered = currentFilter === 'all' ? clients : clients.filter(c=>c.status===currentFilter);

  if(!filtered.length){
    list.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--muted);font-size:.8rem">${currentFilter==='all'?'لا يوجد عملاء بعد — أضف أول عميل 👆':'لا يوجد عملاء في هذه الفئة'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(c => {
    const badgeClass = c.status==='active'?'badge-active':c.status==='pending'?'badge-pending':'badge-expired';
    const badgeText = c.status==='active'?'نشط':c.status==='pending'?'ينتظر':'منتهي';
    const waMsg = encodeURIComponent(`مرحباً ${c.name} 👋`);
    return `<div class="client-item">
      <div class="client-header">
        <div class="client-name">${c.name}</div>
        <span class="client-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="client-info">
        📱 ${c.phone} ${c.salary?'• 💰 '+c.salary.toLocaleString('ar-SA')+' ريال':''}<br>
        🔑 ${c.code} • 📅 ${c.joinDate}${c.renewDate?' • تجديد: '+c.renewDate:''}
        ${c.notes?'<br>📝 '+c.notes:''}
        ${c.messages.length?'<br>💬 '+c.messages.length+' رسالة مولّدة':''}
      </div>
      <div class="client-actions">
        ${c.status==='pending'?`<button class="action-btn btn-approve" onclick="approveClient(${c.id})">✅ قبول وإرسال الكود</button>`:''}
        <a href="https://wa.me/966${c.phone.replace(/^0/,'')}?text=${waMsg}" target="_blank" class="action-btn btn-wa">واتساب 💬</a>
        <button class="action-btn btn-del" onclick="deleteClient(${c.id})">حذف 🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function updateSelects(){
  const options = clients.map(c=>`<option value="${c.id}">${c.name} — ${c.phone}</option>`).join('');
  ['code-client-sel','ai-client-sel'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.innerHTML = '<option value="">اختر عميلاً...</option>' + options;
  });
}

function updateStats(){
  const active = clients.filter(c=>c.status==='active').length;
  const pending = clients.filter(c=>c.status==='pending').length;
  document.getElementById('s-total').textContent = clients.length;
  document.getElementById('s-active').textContent = active;
  document.getElementById('s-pending').textContent = pending;
  document.getElementById('s-revenue').textContent = (active * 49).toLocaleString('ar-SA');
  document.getElementById('header-stats').textContent = `${active} نشط • ${pending} انتظار`;
}

function showToast(msg, isErr=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr?' err':'');
  setTimeout(()=>t.className='toast', 2500);
}

// Save valid code to localStorage (shared with main site)
function saveValidCode(code, clientName){
  try{
    const codes = JSON.parse(localStorage.getItem('rattibni_valid_codes')||'[]');
    // Remove old entry for this code if exists
    const filtered = codes.filter(c=>c.code!==code);
    filtered.push({code, clientName, status:'active', createdAt:new Date().toISOString()});
    localStorage.setItem('rattibni_valid_codes', JSON.stringify(filtered));
  }catch(e){}
}

// Deactivate code when client is deleted
function deactivateCode(code){
  try{
    const codes = JSON.parse(localStorage.getItem('rattibni_valid_codes')||'[]');
    const found = codes.find(c=>c.code===code);
    if(found) found.status='inactive';
    localStorage.setItem('rattibni_valid_codes', JSON.stringify(codes));
  }catch(e){}
}

// Init
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('pw-input').addEventListener('keydown', e=>e.key==='Enter'&&login());
});
</script>
